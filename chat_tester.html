// 우클릭 커멘트 (텍스트 드래그 → 우클릭 → 커멘트)
// ══════════════════════════════════════════
(function() {
  let ctxMenu = null;

  function removeCtxMenu() {
    if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
  }

  document.addEventListener('click', removeCtxMenu);
  document.addEventListener('scroll', removeCtxMenu, true);

  document.getElementById('messages').addEventListener('contextmenu', function(e) {
    const sel = window.getSelection();
    const selectedText = sel ? sel.toString().trim() : '';
    if (!selectedText || selectedText.length < 2) return; // 선택 없으면 기본 메뉴

    // assistant 메시지 안에서만 동작
    const msgDiv = e.target.closest('.msg.assistant');
    if (!msgDiv) return;

    e.preventDefault();
    removeCtxMenu();

    // msgId 찾기
    const evalHeader = msgDiv.querySelector('[id^="eval-header-"]');
    const commentForm = msgDiv.querySelector('[id^="commentForm_"]');
    let msgId = '';
    if (evalHeader) msgId = evalHeader.id.replace('eval-header-', '');
    else if (commentForm) msgId = commentForm.id.replace('commentForm_', '');

    // 커스텀 컨텍스트 메뉴 생성
    ctxMenu = document.createElement('div');
    ctxMenu.className = 'ctx-menu';
    ctxMenu.innerHTML = `
      <div class="ctx-menu-item" data-action="comment">💬 선택 텍스트에 커멘트 달기</div>
      <div class="ctx-menu-separator"></div>
      <div class="ctx-menu-item" data-action="copy">📋 복사</div>
    `;

    // 위치
    ctxMenu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
    ctxMenu.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px';
    document.body.appendChild(ctxMenu);

    // 이벤트
    ctxMenu.querySelector('[data-action="comment"]').addEventListener('click', function() {
      removeCtxMenu();
      openContextComment(msgDiv, msgId, selectedText);
    });
    ctxMenu.querySelector('[data-action="copy"]').addEventListener('click', function() {
      navigator.clipboard.writeText(selectedText);
      removeCtxMenu();
      showToast('클립보드에 복사됨', 'info');
    });
  });

  function openContextComment(msgDiv, msgId, selectedText) {
    // 해당 턴의 질문 추출 (이전 user 메시지)
    let userQuery = '';
    let prev = msgDiv.previousElementSibling;
    while (prev) {
      if (prev.classList.contains('user')) {
        const bubble = prev.querySelector('.bubble');
        userQuery = bubble ? bubble.textContent.trim() : '';
        break;
      }
      prev = prev.previousElementSibling;
    }

    // 해당 턴의 AI 답변 전체 추출
    const assistantBubble = msgDiv.querySelector('.bubble');
    const fullResponse = assistantBubble ? assistantBubble.textContent.trim() : '';

    // 선택 텍스트 하이라이트
    const sel = window.getSelection();
    if (sel.rangeCount > 0) {
      try {
        const range = sel.getRangeAt(0);
        const mark = document.createElement('mark');
        mark.className = 'highlight-comment';
        range.surroundContents(mark);
      } catch(e) { /* cross-node selection — 무시 */ }
    }

    // 컨텍스트를 임시 저장
    window._ctxCommentData = { msgId, selectedText, userQuery, fullResponse };

    // 인라인 커멘트 폼 생성
    const existing = document.getElementById('ctxCommentForm');
    if (existing) existing.remove();

    const form = document.createElement('div');
    form.id = 'ctxCommentForm';
    form.style.cssText = 'margin-top:10px;padding:12px;background:var(--bg);border:1px solid var(--accent);border-radius:8px;';
    form.innerHTML = `
      <div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--accent)">💬 선택 텍스트 커멘트</div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">
        <div style="background:var(--surface);padding:4px 8px;border-radius:4px;margin-bottom:4px;border-left:3px solid var(--accent)">
          <strong>질문:</strong> ${escapeHtml(userQuery).substring(0, 100)}${userQuery.length > 100 ? '...' : ''}
        </div>
        <div style="background:var(--surface);padding:4px 8px;border-radius:4px;border-left:3px solid var(--yellow);max-height:40px;overflow-y:auto">
          <strong>선택:</strong> ${escapeHtml(selectedText).substring(0, 150)}${selectedText.length > 150 ? '...' : ''}
        </div>
      </div>
      <select id="ctxCommentCat" style="width:100%;padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:6px">
        <option value="부정확한 정보">부정확한 정보</option><option value="불충분한 답변">불충분한 답변</option>
        <option value="위험한 조언">위험한 조언</option><option value="면책 조항 누락">면책 조항 누락</option>
        <option value="과잉 진단/처방">과잉 진단/처방</option><option value="출처 불명확">출처 불명확</option>
        <option value="표현 부적절">표현 부적절</option><option value="기타">기타</option>
      </select>
      <textarea id="ctxCommentText" rows="2" placeholder="의견을 입력하세요..." style="width:100%;padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px;resize:none;box-sizing:border-box"></textarea>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button onclick="submitCtxComment()" style="padding:6px 16px;background:var(--accent);color:#0f172a;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">등록</button>
        <button onclick="document.getElementById('ctxCommentForm').remove();document.querySelectorAll('.highlight-comment').forEach(m=>{const p=m.parentNode;p.replaceChild(document.createTextNode(m.textContent),m);p.normalize()})" style="padding:6px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer">취소</button>
      </div>
    `;

    if (assistantBubble) assistantBubble.parentNode.insertBefore(form, assistantBubble.nextSibling);
    else msgDiv.appendChild(form);
    document.getElementById('ctxCommentText').focus();
  }
})();

async function submitCtxComment() {
  const data = window._ctxCommentData;
  if (!data) { showToast('커멘트 데이터 없음', 'error'); return; }
  const cat = document.getElementById('ctxCommentCat').value;
  const content = document.getElementById('ctxCommentText').value.trim();
  if (!content) { showToast('커멘트 내용을 입력하세요', 'error'); return; }
  if (!currentConvId) { showToast('대화가 저장되지 않았습니다', 'error'); return; }

  try {
    const res = await fetch(`/api/conversations/${currentConvId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        msgId: data.msgId || window._lastAssistantMsgId,
        category: cat,
        content: content,
        selectedText: data.selectedText,
        userQuery: data.userQuery,
        fullResponse: data.fullResponse
      })
    });
    if (res.ok) {
      showToast('커멘트가 등록되었습니다', 'success');
      document.getElementById('ctxCommentForm')?.remove();
      window._ctxCommentData = null;
      // 대화 다시 로드하여 커멘트 즉시 반영
      if (currentConvId) loadConversation(currentConvId);
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.error || '커멘트 등록 실패', 'error');
    }
  } catch(e) {
    showToast('커멘트 등록 실패: ' + e.message, 'error');
  }
}

// 시나리오 추출
// ══════════════════════════════════════
async function extractScenarioFromConversation(convId) {
  try {
    const res = await fetch(`/api/conversations/${convId}`);
    if (!res.ok) { showToast('대화 로드 실패', 'error'); return; }
    const conv = await res.json();
    const messages = conv.messages || [];

    // Q&A 턴 추출
    const turns = [];
    for (let i = 0; i < messages.length; i++) {
      if (messages[i].role === 'user') {
        const q = messages[i].content;
        const a = (messages[i+1] && messages[i+1].role === 'assistant') ? messages[i+1] : null;
        const comments = a ? (a.comments || []) : [];
        const gptEval = a ? a.gptEval : null;
        turns.push({ index: i, question: q, answer: a ? a.content : '', comments, gptEval, msgId: a ? a.msgId : '' });
      }
    }

    if (turns.length === 0) { showToast('추출할 Q&A 턴이 없습니다', 'error'); return; }

    // 모달 생성
    const existing = document.getElementById('extractModal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'extractModal';
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:700;display:flex;align-items:center;justify-content:center';

    const turnsHtml = turns.map((t, i) => {
      const cmtBadge = t.comments.length > 0 ? `<span style="color:var(--yellow);font-size:10px">💬${t.comments.length}</span>` : '';
      const evalBadge = t.gptEval ? `<span style="font-size:10px;color:${t.gptEval.passed ? 'var(--green)' : 'var(--red)'}">${t.gptEval.grade} ${t.gptEval.score}점</span>` : '';
      return `<label style="display:flex;gap:8px;padding:8px;background:var(--surface);border-radius:6px;margin-bottom:4px;cursor:pointer;align-items:flex-start">
        <input type="checkbox" value="${i}" ${i === 0 ? 'checked' : ''} style="margin-top:3px">
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--text)">Q: ${escapeHtml(t.question.substring(0, 80))}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:2px">A: ${escapeHtml(t.answer.substring(0, 100))}...</div>
          <div style="display:flex;gap:6px;margin-top:4px">${cmtBadge}${evalBadge}</div>
        </div>
      </label>`;
    }).join('');

    modal.innerHTML = `<div style="background:var(--bg);border-radius:12px;padding:24px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto;border:1px solid var(--border)">
      <h3 style="color:var(--text);margin:0 0 16px">📋 시나리오 추출</h3>
      <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px">추출할 턴을 선택하세요. 첫 번째 턴이 메인 프롬프트, 나머지는 후속 질문이 됩니다.</p>
      <div id="extractTurns" style="margin-bottom:16px">${turnsHtml}</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:4px;color:var(--text);font-size:12px">
          <input type="checkbox" id="extractAutoClassify" checked> GPT 자동 분류
        </label>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="document.getElementById('extractModal').remove()" style="padding:8px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer">취소</button>
        <button onclick="doExtractScenario('${convId}')" id="extractBtn" style="padding:8px 16px;background:var(--accent);color:#0f172a;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">추출하기</button>
      </div>
      <div id="extractResult" style="margin-top:12px;display:none"></div>
    </div>`;

    document.body.appendChild(modal);
    window._extractTurns = turns;
  } catch(e) {
    showToast('시나리오 추출 실패: ' + e.message, 'error');
  }
}

async function doExtractScenario(convId) {
  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  btn.textContent = '추출 중...';

  const checkboxes = document.querySelectorAll('#extractTurns input[type=checkbox]:checked');
  const selectedIndices = Array.from(checkboxes).map(cb => parseInt(cb.value));
  if (selectedIndices.length === 0) { showToast('턴을 선택하세요', 'error'); btn.disabled = false; btn.textContent = '추출하기'; return; }

  const autoClassify = document.getElementById('extractAutoClassify').checked;
  const turns = window._extractTurns;

  // 선택된 턴 데이터 구성
  const selectedTurns = selectedIndices.map(i => turns[i]);
  const mainPrompt = selectedTurns[0].question;
  const followUps = selectedTurns.slice(1).map(t => ({ prompt: t.question, expectedBehavior: '' }));

  try {
    const res = await fetch('/api/conversations/extract-scenario', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        convId,
        mainPrompt,
        followUps,
        turns: selectedTurns.map(t => ({ question: t.question, answer: t.answer.substring(0, 2000), comments: t.comments, gptEval: t.gptEval })),
        autoClassify
      })
    });
    const data = await res.json();
    if (data.success && data.scenario) {
      const sc = data.scenario;
      const resultDiv = document.getElementById('extractResult');
      resultDiv.style.display = 'block';
      window._extractedScenario = sc;
      const scId = sc.id || '';
      resultDiv.innerHTML = `<div style="background:var(--surface);border-radius:8px;padding:12px;border:1px solid var(--border)">
        <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px">✅ 시나리오 추출 완료 — 내용을 확인 후 저장하세요</div>
        <div style="margin-bottom:6px"><label style="font-size:11px;color:var(--text-dim)">ID</label>
          <input id="extId" value="${escapeHtml(scId)}" readonly style="width:100%;padding:5px 8px;background:var(--bg);color:var(--text-dim);border:1px solid var(--border);border-radius:4px;font-size:12px;box-sizing:border-box"></div>
        <div style="margin-bottom:6px"><label style="font-size:11px;color:var(--text-dim)">카테고리</label>
          <select id="extCategory" style="width:100%;padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px">
            ${(window._categories||[]).map(c => '<option value="'+c.id+'"'+(c.id===sc.category?' selected':'')+'>'+escapeHtml(c.name)+'</option>').join('')}
          </select></div>
        <div style="margin-bottom:6px"><label style="font-size:11px;color:var(--text-dim)">리스크</label>
          <select id="extRisk" style="width:100%;padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px">
            ${['LOW','MEDIUM','HIGH','CRITICAL'].map(r => '<option value="'+r+'"'+(r===sc.riskLevel?' selected':'')+'>'+r+'</option>').join('')}
          </select></div>
        <div style="margin-bottom:6px"><label style="font-size:11px;color:var(--text-dim)">프롬프트</label>
          <textarea id="extPrompt" rows="2" style="width:100%;padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;resize:vertical;box-sizing:border-box">${escapeHtml(sc.prompt)}</textarea></div>
        <div style="margin-bottom:6px"><label style="font-size:11px;color:var(--text-dim)">기대 동작</label>
          <textarea id="extExpected" rows="2" style="width:100%;padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;resize:vertical;box-sizing:border-box">${escapeHtml(sc.expectedBehavior||'')}</textarea></div>
        <div style="margin-bottom:6px"><label style="font-size:11px;color:var(--text-dim)">태그 (쉼표 구분)</label>
          <input id="extTags" value="${escapeHtml((sc.tags||[]).join(', '))}" style="width:100%;padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;box-sizing:border-box"></div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button onclick="saveExtractedScenario()" style="flex:1;padding:8px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">💾 시나리오 저장</button>
          <button onclick="document.getElementById('extractResult').style.display='none'" style="padding:8px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;cursor:pointer">취소</button>
        </div>
      </div>`;
      btn.disabled = false;
      btn.textContent = '추출하기';
    } else {
      showToast(data.error || '추출 실패', 'error');
      btn.disabled = false;
      btn.textContent = '추출하기';
    }
  } catch(e) {
    showToast('추출 실패: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '추출하기';
  }
}

async function saveExtractedScenario() {
  const sc = window._extractedScenario;
  if (!sc) return showToast('저장할 시나리오가 없습니다', 'error');
  const updated = {
    category: document.getElementById('extCategory').value,
    riskLevel: document.getElementById('extRisk').value,
    prompt: document.getElementById('extPrompt').value.trim(),
    expectedBehavior: document.getElementById('extExpected').value.trim(),
    tags: document.getElementById('extTags').value.split(',').map(t => t.trim()).filter(Boolean),
  };
  if (!updated.prompt) return showToast('프롬프트를 입력하세요', 'error');
  try {
    const res = await fetch(`/api/scenarios/${sc.id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updated)
    });
    if (res.ok) {
      showToast('시나리오가 저장되었습니다', 'success');
      document.getElementById('extractResult').innerHTML = `<div style="background:var(--surface);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--green)">
        <div style="font-size:13px;color:var(--green);font-weight:700">✅ 저장 완료: ${escapeHtml(sc.id)}</div>
        <div style="margin-top:6px;font-size:12px;color:var(--text-dim)">시나리오 관리에서 확인하세요</div>
      </div>`;
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.error || '저장 실패', 'error');
    }
  } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
}

// 카테고리 목록 로드 (추출 시 선택용)
(async function loadCategories() {
  try {
    const res = await fetch('/api/categories');
    if (res.ok) window._categories = (await res.json()).categories || [];
  } catch(e) {}
})();

// ── 프롬프트 보강 재질문 ──

async function requestEnhancedPrompt(originalQuery, gptEval, consultationEval, compliance, originalMsgId) {
  try {
    const proxy = getProxyUrl() || window.location.origin;
    const res = await fetch(proxy + '/api/enhance-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: originalQuery, gptEval: gptEval, consultationEval: consultationEval, compliance: compliance })
    });
    const data = await res.json();

    window._enhancementContext = {
      originalQuery: originalQuery,
      originalMsgId: originalMsgId,
      originalEval: { gptEval: gptEval, consultationEval: consultationEval, compliance: compliance },
      instructions: data.instructions,
      enhancedPrompt: data.enhancedPrompt,
    };

    var instrEl = document.getElementById('enhanceInstructions');
    if (instrEl) {
      instrEl.innerHTML = '<div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px">\uD83D\uDCA1 \uCD94\uAC00\uB41C \uC9C0\uC2DC\uBB38:</div>' +
        data.instructions.map(function(inst) {
          return '<div style="font-size:12px;color:var(--text);padding:3px 0;padding-left:12px;border-left:2px solid var(--accent)">\u2022 ' + escapeHtml(inst) + '</div>';
        }).join('');
    }

    var promptTextEl = document.getElementById('enhancePromptText');
    if (promptTextEl) promptTextEl.value = data.enhancedPrompt;
    var modal = document.getElementById('enhanceModal');
    if (modal) modal.style.display = 'flex';
  } catch(e) {
    showToast('\uBCF4\uAC15 \uD504\uB85C\uD504\uD2B8 \uC0DD\uC131 \uC2E4\uD328: ' + e.message, 'error');
  }
}

async function sendEnhancedPrompt() {
  var modal = document.getElementById('enhanceModal');
  if (modal) modal.style.display = 'none';

  var enhancedText = '';
  var promptTextEl = document.getElementById('enhancePromptText');
  if (promptTextEl) enhancedText = promptTextEl.value.trim();
  if (!enhancedText) return;

  window._isEnhancedMessage = true;

  var input = document.getElementById('userInput');
  if (input) {
    input.value = enhancedText;
    sendMessage();
  }
}

async function saveEnhancementReport() {
  var ctx = window._enhancementContext;
  if (!ctx) { showToast('\uBCF4\uAC15 \uCEE8\uD14D\uC2A4\uD2B8 \uC5C6\uC74C', 'error'); return; }

  try {
    var proxy = getProxyUrl() || window.location.origin;
    var res = await fetch(proxy + '/api/prompt-enhancement', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        conversationId: currentConvId,
        originalMsgId: ctx.originalMsgId,
        enhancedMsgId: window._lastAssistantMsgId || ctx.enhancedMsgId,
        originalQuery: ctx.originalQuery,
        enhancedPrompt: ctx.enhancedPrompt,
        instructions: ctx.instructions,
        originalEval: ctx.originalEval,
        enhancedEval: ctx.enhancedEval,
      })
    });
    var data = await res.json();
    if (data.success) {
      showToast('\uB9AC\uD3EC\uD2B8 \uC800\uC7A5 \uC644\uB8CC (GPT ' + (data.improvement.gptDelta > 0 ? '+' : '') + data.improvement.gptDelta + '\uC810)', 'success');
    } else {
      showToast('\uC800\uC7A5 \uC2E4\uD328', 'error');
    }
  } catch(e) {
    showToast('\uC800\uC7A5 \uC2E4\uD328: ' + e.message, 'error');
  }
}
</script>
